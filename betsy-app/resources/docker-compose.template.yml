version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: betsy
      POSTGRES_PASSWORD: ${BC_DB_PASSWORD}
      POSTGRES_DB: betsy
    volumes:
      - betsy-pg:/var/lib/postgresql/data
    restart: unless-stopped

  betsy:
    image: ghcr.io/betsyai/betsy-multi:${BC_ENGINE_VERSION:-latest}
    environment:
      BETSY_MODE: multi
      BC_DATABASE_URL: postgres://betsy:${BC_DB_PASSWORD}@postgres:5432/betsy
      BC_JWT_SECRET: ${BC_JWT_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      BC_TELEGRAM_BOT_TOKEN: ${BC_TELEGRAM_BOT_TOKEN}
      BC_WEBHOOK_BASE_URL: ${BC_WEBHOOK_BASE_URL}
      BC_HTTP_PORT: ${BC_PORT:-3777}
      BC_HEALTHZ_PORT: ${BC_PORT:-3777}
    ports:
      - '${BC_PORT:-3777}:${BC_PORT:-3777}'
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  betsy-pg:
