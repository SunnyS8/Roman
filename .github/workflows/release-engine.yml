name: release-engine

# Triggered manually or by pushing an "engine-vX.Y.Z" tag.
# Builds Dockerfile.multi, pushes to ghcr.io/betsyai/betsy-multi,
# then writes engine/latest.json into the R2 update bucket.
on:
  push:
    tags:
      - 'engine-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Engine version (semver, no leading v)'
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: ver
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/engine-v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.multi
          push: true
          tags: |
            ghcr.io/betsyai/betsy-multi:${{ steps.ver.outputs.version }}
            ghcr.io/betsyai/betsy-multi:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure AWS CLI for R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          mkdir -p ~/.aws
          cat > ~/.aws/credentials <<EOF
          [default]
          aws_access_key_id=${R2_ACCESS_KEY_ID}
          aws_secret_access_key=${R2_SECRET_ACCESS_KEY}
          EOF
          cat > ~/.aws/config <<EOF
          [default]
          region=auto
          EOF

      - name: Write engine manifest to R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          VERSION: ${{ steps.ver.outputs.version }}
          MIN_SHELL_VERSION: ${{ vars.MIN_SHELL_VERSION || '0.1.0' }}
        run: |
          RELEASED_AT="$(date -u +%FT%TZ)"
          cat > /tmp/latest.json <<EOF
          {
            "version": "${VERSION}",
            "image": "ghcr.io/betsyai/betsy-multi:${VERSION}",
            "min_shell_version": "${MIN_SHELL_VERSION}",
            "released_at": "${RELEASED_AT}"
          }
          EOF
          aws s3 cp /tmp/latest.json s3://betsy-updates/engine/latest.json \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            --content-type application/json \
            --cache-control "public, max-age=60"

      - name: Summary
        run: |
          echo "### Engine release published" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`ghcr.io/betsyai/betsy-multi:${{ steps.ver.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Manifest: https://updates.betsyai.io/engine/latest.json" >> "$GITHUB_STEP_SUMMARY"
