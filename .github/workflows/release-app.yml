name: release-app

# Triggered by pushing an "app-vX.Y.Z" tag (or manual dispatch).
# Builds the Electron installer (betsy-app/), signs it if WIN_CSC_* secrets
# are present, and publishes the artifacts to the R2 update bucket so
# electron-updater clients can find the new release.
on:
  push:
    tags:
      - 'app-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'App version (semver, no leading v)'
        required: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # pg-boss@12 requires Node >=22.12; 22 LTS is the floor.
          node-version: '22'
          cache: 'npm'

      # Lockfile was regenerated with optional deps (buildcheck etc.) so
      # native ssh2 compiles on the windows-latest runner via MSVC.
      - name: Install root deps
        run: npm ci

      - name: Install betsy-app deps
        working-directory: betsy-app
        run: npm ci

      - name: Extract version
        id: ver
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/app-v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump betsy-app version
        working-directory: betsy-app
        shell: bash
        run: npm version "${{ steps.ver.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Detect signing config
        id: sign
        shell: bash
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
        run: |
          if [ -n "$WIN_CSC_LINK" ]; then
            echo "signed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Code-signing cert detected — installer will be signed."
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
            echo "::warning::WIN_CSC_LINK secret is empty — installer will ship UNSIGNED. Users will see Windows SmartScreen warning on first install. Procure a Microsoft Trusted Signing subscription (~\$120/yr) or EV cert and add WIN_CSC_LINK + WIN_CSC_KEY_PASSWORD secrets to enable signing."
          fi

      - name: Build electron-builder (we publish ourselves below)
        working-directory: betsy-app
        env:
          # Empty WIN_CSC_LINK means electron-builder ships unsigned — fine
          # until cert is procured. Once present, electron-builder will sign.
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        # --publish never — electron-builder's "generic" provider is read-only
        # (used by electron-updater clients to fetch). We upload to R2 via aws
        # s3 cp in the next step.
        run: npm run build && npx electron-builder --win --x64 --publish never

      - name: List release artifacts
        working-directory: betsy-app
        shell: bash
        run: ls -la release/

      - name: Setup SSH for VPS upload
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 193.42.124.214 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload artifacts to VPS (updates.betsyai.io)
        working-directory: betsy-app
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        shell: bash
        # /var/www/updates/electron/win-x64/ is served by nginx at
        # https://updates.betsyai.io/electron/win-x64/. nginx caches *.yml/
        # *.json for 60s and *.exe/*.blockmap for 30 days — match those by
        # name so the static cache headers do the right thing.
        run: |
          REMOTE="root@193.42.124.214:/var/www/updates/electron/win-x64/"
          shopt -s nullglob
          for f in release/*.exe release/*.exe.blockmap release/latest.yml; do
            [ -f "$f" ] || continue
            echo "scp $f -> $REMOTE"
            scp -i ~/.ssh/id_ed25519 "$f" "$REMOTE"
          done

          # Maintain stable "latest" installer pointer for the download page.
          # electron-builder names it "Betsy Setup ${version}.exe" (with space).
          SRC=""
          if [ -f "release/Betsy Setup ${VERSION}.exe" ]; then
            SRC="release/Betsy Setup ${VERSION}.exe"
          else
            SRC="$(ls release/*.exe | head -n1)"
          fi
          if [ -n "$SRC" ] && [ -f "$SRC" ]; then
            echo "publishing latest pointer from $SRC"
            scp -i ~/.ssh/id_ed25519 "$SRC" "${REMOTE}Betsy-Setup-latest.exe"
          fi

      - name: Upload release artifacts (GitHub)
        uses: actions/upload-artifact@v4
        with:
          name: betsy-app-${{ steps.ver.outputs.version }}-win-x64
          path: |
            betsy-app/release/*.exe
            betsy-app/release/*.exe.blockmap
            betsy-app/release/latest.yml
          if-no-files-found: warn
          retention-days: 30

      - name: Summary
        shell: bash
        run: |
          echo "### App release published" >> "$GITHUB_STEP_SUMMARY"
          echo "- Version: ${{ steps.ver.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Installer: https://updates.betsyai.io/electron/win-x64/Betsy-Setup-latest.exe" >> "$GITHUB_STEP_SUMMARY"
          echo "- Update manifest: https://updates.betsyai.io/electron/win-x64/latest.yml" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.sign.outputs.signed }}" = "true" ]; then
            echo "- Signing: ✅ signed" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Signing: ⚠️ UNSIGNED — users will see SmartScreen warning. See [docs/download-page-copy.md](https://github.com/Aimagine-life/Betsy/blob/main/docs/download-page-copy.md) for user-facing instructions." >> "$GITHUB_STEP_SUMMARY"
          fi
